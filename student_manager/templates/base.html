<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 성적 관리 시스템</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">📚 학생 성적 관리 시스템</div>
  <div class="nav-links">
    <a href="{{ url_for('index') }}"  class="{{ 'active' if request.endpoint=='index'  else '' }}">👤 학생 관리</a>
    <a href="{{ url_for('scores') }}" class="{{ 'active' if request.endpoint=='scores' else '' }}">📝 성적 관리</a>
    <a href="{{ url_for('stats') }}"  class="{{ 'active' if request.endpoint=='stats'  else '' }}">📊 통계</a>
  </div>
</nav>

<div class="container">
  {% with msgs = get_flashed_messages() %}
    {% for kind, msg in msgs %}
      <div class="alert alert-{{ kind }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
